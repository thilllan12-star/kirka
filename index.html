    <style>
        :root {

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

            padding: 20px;

        }

        .header {
            text-align: center;
            background: white;
            padding: 15px 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 500px;
        }

        .stat-card {
            background: white;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            border-bottom: 4px solid #ddd;
        }

        .clicker-container {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .tap-button {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-weight: bold;
            color: white;
            font-size: 16px;
            transition: transform 0.1s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 0 #333;
        }

        .tap-button:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #333;
        }

        .btn-stone { background-color: var(--primary-stone); box-shadow: 0 6px 0 #5d6d6e; }
        .btn-wood { background-color: var(--primary-wood); box-shadow: 0 6px 0 #7e3e37; }

        .craft-panel, .olga-panel {
            background: #fff;
            padding: 20px;
            border-radius: 15px;
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .npc-img {
            float: left;
            width: 80px;
            height: 80px;
            background: #eee;
            border-radius: 50%;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            border: 3px solid #f1c40f;
        }

        button.action-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 5px;
            width: 100%;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .limit-info {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            background: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            display: none;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>

        <button class="action-btn" id="sell-btn" onclick="sellShovels()" style="background: #e67e22;">Сдать 100 лопат</button>
        <button class="action-btn" onclick="upgradeLimit()" style="background: #9b59b6; margin-top: 10px;">Расширить лимит (+50) за 2000 монет</button>

    <div id="toast" class="toast"></div>

    <script>
        // Состояние игры (загрузка из памяти или дефолт)
        let state = JSON.parse(localStorage.getItem('gameSave')) || {
            stone: 0,
            wood: 0,
            iron: 0,
            planks: 0,
            shovels: 0,
            currency: 0,
            stoneLimit: 100,
            woodLimit: 100,
            maxLimit: 100,
            lastReset: Date.now()
        };

        // Обновление лимитов каждый час
        function checkLimitReset() {
            const now = Date.now();
            if (now - state.lastReset > 3600000) { // 1 час в мс
                state.stoneLimit = state.maxLimit;
                state.woodLimit = state.maxLimit;
                state.lastReset = now;
                save();
                showToast("Лимиты обновлены!");
            }
        }

        function mine(type) {
            checkLimitReset();
            if (type === 'stone' && state.stoneLimit > 0) {
                state.stone++;
                state.stoneLimit--;
            } else if (type === 'wood' && state.woodLimit > 0) {
                state.wood++;
                state.woodLimit--;
            } else {
                showToast("Лимит исчерпан! Жди час.");
                return;
            }
            updateUI();
            save();
        }

        function craft(item) {
            if (item === 'iron' && state.stone >= 10) {
                state.stone -= 10;
                state.iron++;
            } else if (item === 'plank' && state.wood >= 10) {
                state.wood -= 10;
                state.planks++;
            } else if (item === 'shovel' && state.iron >= 1 && state.planks >= 1) {
                state.iron--;
                state.planks--;
                state.shovels++;
            } else {
                showToast("Недостаточно ресурсов!");
                return;
            }
            updateUI();
            save();
        }

        function sellShovels() {
            if (state.shovels >= 100) {

state.shovels -= 100;
                state.currency += (100 * 40);
                showToast("Ольга Михайловна довольна!");
            } else {
                showToast("Нужно минимум 100 лопат!");
            }
            updateUI();
            save();
        }

        function upgradeLimit() {
            if (state.currency >= 2000) {
                state.currency -= 2000;
                state.maxLimit += 50;
                state.stoneLimit += 50;
                state.woodLimit += 50;
                showToast("Лимит расширен!");
            } else {
                showToast("Маловато денег...");
            }
            updateUI();
            save();
        }

        function save() {
            localStorage.setItem('gameSave', JSON.stringify(state));
        }

        function updateUI() {
            document.getElementById('stone-count').innerText = state.stone;
            document.getElementById('wood-count').innerText = state.wood;
            document.getElementById('iron-count').innerText = state.iron;
            document.getElementById('plank-count').innerText = state.planks;
            document.getElementById('shovel-count').innerText = state.shovels;
            document.getElementById('total-valute').innerText = Валюта: ${state.currency} 🪙;
            document.getElementById('stone-limit').innerText = state.stoneLimit;
            document.getElementById('wood-limit').innerText = state.woodLimit;
        }

        function showToast(text) {
            const t = document.getElementById('toast');
            t.innerText = text;
            t.style.display = 'block';
            setTimeout(() => { t.style.display = 'none'; }, 2000);
        }

        // Инициализация
        setInterval(checkLimitReset, 60000); // Проверять время каждую минуту
        updateUI();
    </script>
</body>
</html>
