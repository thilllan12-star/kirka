    <script>
        // --- Логика Игры (без изменений, только UI) ---
        let state = JSON.parse(localStorage.getItem('gameSave_v2')) || {
            stone: 0,
            wood: 0,
            iron: 0,
            planks: 0,
            shovels: 0,
            currency: 0,
            stoneLimit: 100,
            woodLimit: 100,
            maxLimit: 100,
            lastReset: Date.now()
        };

        function checkLimitReset() {
            const now = Date.now();
            if (now - state.lastReset > 3600000) {
                state.stoneLimit = state.maxLimit;
                state.woodLimit = state.maxLimit;
                state.lastReset = now;
                save();
                showToast("Лимиты обновлены!");
            }
        }

        function mine(type) {
            checkLimitReset();
            if (type === 'stone' && state.stoneLimit > 0) {
                state.stone++;
                state.stoneLimit--;
            } else if (type === 'wood' && state.woodLimit > 0) {
                state.wood++;
                state.woodLimit--;
            } else {
                showToast("Лимит исчерпан! Жди час.");
                return;
            }
            updateUI();
            save();
        }

        function craft(item) {
            if (item === 'iron' && state.stone >= 10) {
                state.stone -= 10;
                state.iron++;
            } else if (item === 'plank' && state.wood >= 10) {
                state.wood -= 10;
                state.planks++;
            } else if (item === 'shovel' && state.iron >= 1 && state.planks >= 1) {
                state.iron--;
                state.planks--;
                state.shovels++;
            } else {
                showToast("Недостаточно ресурсов!");
                return;
            }
            updateUI();
            save();
        }

        function sellShovels() {
            if (state.shovels >= 100) {
                state.shovels -= 100;
                state.currency += (100 * 40);
                showToast("Ольга Михайловна довольна!");
            } else {
                showToast("Нужно минимум 100 лопат!");
            }
            updateUI();
            save();
        }

        function upgradeLimit() {
            if (state.currency >= 2000) {
                state.currency -= 2000;
                state.maxLimit += 50;
                state.stoneLimit += 50;
                state.woodLimit += 50;
                showToast("Лимит расширен!");
            } else {
                showToast("Маловато денег...");
            }
            updateUI();
            save();
        }

function save() {
            localStorage.setItem('gameSave_v2', JSON.stringify(state));
        }

        function updateUI() {
            // Ресурсы
            document.getElementById('stone-count').innerText = state.stone;
            document.getElementById('wood-count').innerText = state.wood;
            document.getElementById('iron-count').innerText = state.iron;
            document.getElementById('plank-count').innerText = state.planks;
            document.getElementById('shovel-count').innerText = state.shovels;
            document.getElementById('total-valute').innerText = state.currency;

            // Лимиты и полоски
            document.getElementById('stone-limit').innerText = state.stoneLimit;
            document.getElementById('wood-limit').innerText = state.woodLimit;
            
            const maxTexts = document.querySelectorAll('.max-limit-text');
            maxTexts.forEach(el => el.innerText = state.maxLimit);

            const stonePerc = (state.stoneLimit / state.maxLimit) * 100;
            const woodPerc = (state.woodLimit / state.maxLimit) * 100;
            document.getElementById('stone-bar').style.width = stonePerc + '%';
            document.getElementById('wood-bar').style.width = woodPerc + '%';

            // Цвет полосок (краснеет при исчерпании)
            updateBarColor('stone-bar', stonePerc);
            updateBarColor('wood-bar', woodPerc);

            // Кнопки (делаем неактивными, если мало ресурсов)
            document.getElementById('craft-iron-btn').disabled = (state.stone < 10);
            document.getElementById('craft-plank-btn').disabled = (state.wood < 10);
            document.getElementById('craft-shovel-btn').disabled = (state.iron < 1 || state.planks < 1);
            document.getElementById('sell-btn').disabled = (state.shovels < 100);
            document.getElementById('upgrade-btn').disabled = (state.currency < 2000);
        }

        function updateBarColor(barId, percentage) {
            const bar = document.getElementById(barId);
            if (percentage < 20) bar.style.background = '#e74c3c';
            else if (percentage < 50) bar.style.background = '#f39c12';
            else bar.style.background = '#2ecc71';
        }

        function showToast(text) {
            const t = document.getElementById('toast');
            t.innerText = text;
            t.style.display = 'block';
            setTimeout(() => { t.style.display = 'none'; }, 2000);
        }

        // Инициализация
        setInterval(checkLimitReset, 60000);
        updateUI();
    </script>
